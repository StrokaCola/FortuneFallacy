<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fortune Fallacy — All Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --cosmos-50:#f3f0ff; --cosmos-100:#dcd4ff; --cosmos-200:#bba8ff;
    --cosmos-300:#9577ff; --cosmos-400:#7752f0; --cosmos-500:#5c39c4;
    --cosmos-600:#432896; --cosmos-700:#2e1d6b; --cosmos-800:#1c1245;
    --cosmos-900:#0f0925; --cosmos-950:#07051a;
    --ember:#ff7847; --crimson:#e2334a; --gold:#f5c451; --astral:#7be3ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: #07051a; color: #f3f0ff;
    font-family: 'Exo 2', system-ui, sans-serif;
    overflow: hidden;
  }
  .f-display { font-family: 'Cinzel Decorative', serif; letter-spacing: .02em; }
  .f-head    { font-family: 'Cinzel', serif; letter-spacing: .06em; }
  .f-mono    { font-family: 'JetBrains Mono', monospace; }
  .num       { font-variant-numeric: tabular-nums; }

  @keyframes twinkle { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  @keyframes orbit   { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes pulse-glow { 0%,100% { filter: drop-shadow(0 0 6px var(--astral)); } 50% { filter: drop-shadow(0 0 18px var(--astral)); } }
  @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes constellation-draw { from { stroke-dashoffset: var(--len, 200); } to { stroke-dashoffset: 0; } }
  @keyframes idle-tumble {
    0%, 100% { transform: var(--face-rot) rotateX(0deg) rotateY(0deg); }
    25%      { transform: var(--face-rot) rotateX(4deg) rotateY(-3deg); }
    50%      { transform: var(--face-rot) rotateX(-3deg) rotateY(5deg); }
    75%      { transform: var(--face-rot) rotateX(2deg) rotateY(-2deg); }
  }

  /* shared */
  .panel        { background: linear-gradient(180deg, rgba(46,29,107,.35), rgba(15,9,37,.55)); backdrop-filter: blur(10px); border:1px solid rgba(149,119,255,.22); border-radius:16px; }
  .panel-strong { background: linear-gradient(180deg, rgba(46,29,107,.65), rgba(15,9,37,.85)); border:1px solid rgba(149,119,255,.34); border-radius:16px; box-shadow: 0 12px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04); }
  .btn { cursor: pointer; font-family: 'Cinzel', serif; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; border: none; transition: filter 120ms; user-select: none; }
  .btn:hover { filter: brightness(1.1); }
  .btn-primary { background: linear-gradient(180deg, #ff8a5e, #e85a28); color: #20100a; padding: 14px 28px; border-radius: 10px; font-size: 18px; box-shadow: 0 0 0 1px rgba(255,180,140,.6), 0 6px 18px rgba(255,120,71,.35), inset 0 1px 0 rgba(255,255,255,.4); }
  .btn-ghost   { background: rgba(28,18,69,.6); color: #f3f0ff; padding: 12px 22px; border-radius: 10px; font-size: 14px; box-shadow: 0 0 0 1px rgba(149,119,255,.3); backdrop-filter: blur(8px); }
  .flourish-corner { position: absolute; width: 22px; height: 22px; border: 1px solid rgba(245,196,81,.5); pointer-events: none; }
  .flourish-corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .flourish-corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
  .flourish-corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
  .flourish-corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

  /* 3d die */
  .die3d-wrap   { position: relative; perspective: 800px; user-select: none; }
  .die3d        { position: relative; transform-style: preserve-3d; transition: transform 600ms cubic-bezier(.4,1.4,.5,1); }
  .die3d-face   { position: absolute; inset: 0; display: grid; place-items: center; border-radius: 12px; backface-visibility: hidden; }
  .die3d-face::before { content:""; position:absolute; inset:1px; border-radius:11px; background:linear-gradient(160deg, rgba(255,255,255,.10), transparent 55%); pointer-events:none; }
  .die3d-wrap.idle .die3d { animation: idle-tumble 8s ease-in-out infinite; }
  .die3d-wrap.locked { transform: translateY(-12px); }
  .die3d-wrap.scoring::after { content:""; position:absolute; inset:-10px; border-radius:22px; border:1.5px solid var(--astral); box-shadow: 0 0 28px var(--astral), inset 0 0 12px rgba(123,227,255,.4); pointer-events:none; animation: pulse-glow 1.6s ease-in-out infinite; }
  .die3d-shadow { position: absolute; left: 50%; bottom: -10px; width: 70%; height: 12px; transform: translateX(-50%); background: radial-gradient(ellipse, rgba(0,0,0,.55), transparent 70%); filter: blur(4px); pointer-events:none; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="cosmos.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    // each artboard mounts a fixed 1280x800 stage + the requested screen
    function Frame({ screen, tweaksOverride = {} }) {
      const tweaks = {
        screen, theme: 'voidlit', dieStyle: 'celestial', starDensity: 1,
        nebula: false, parallax: false, constellationLines: true, scoringFx: true,
        dieSize: 88, trayCurve: 1.3, primaryAccent: 'astral',
        comboTier: 'full_house', boss: 'the_fool',
        shardsCount: 12, anteLevel: 2, showInlineHelp: true,
        ...tweaksOverride,
      };
      const screens = { title: TitleScreen, round: RoundScreen, hub: HubScreen,
                        shop: ShopScreen, forge: ForgeScreen, boss: BossRevealScreen };
      const Screen = screens[screen];
      return (
        <div style={{ width: 1280, height: 800, position: 'relative', overflow: 'hidden',
                      background: '#07051a', borderRadius: 8 }}>
          <CosmosBackground theme={tweaks.theme} density={tweaks.starDensity}
                            nebula={tweaks.nebula} drift={tweaks.parallax} />
          <Screen tweaks={tweaks} />
        </div>
      );
    }

    const App = () => (
      <DesignCanvas title="Fortune Fallacy — Screen Mockups">
        <DCSection id="flow" title="Core Game Flow">
          <DCArtboard id="title"  label="Title"        width={1280} height={800}><Frame screen="title" /></DCArtboard>
          <DCArtboard id="hub"    label="Hub · Blind Select" width={1280} height={800}><Frame screen="hub" /></DCArtboard>
          <DCArtboard id="boss"   label="Boss Reveal"  width={1280} height={800}><Frame screen="boss" /></DCArtboard>
          <DCArtboard id="round"  label="Round · Gameplay" width={1280} height={800}><Frame screen="round" /></DCArtboard>
          <DCArtboard id="shop"   label="Bazaar · Shop" width={1280} height={800}><Frame screen="shop" /></DCArtboard>
          <DCArtboard id="forge"  label="Forge · Rune Attach" width={1280} height={800}><Frame screen="forge" /></DCArtboard>
        </DCSection>

        <DCSection id="combos" title="Round — Combo Variations">
          <DCArtboard id="five"   label="Five of a Kind"  width={1280} height={800}><Frame screen="round" tweaksOverride={{ comboTier: 'five_kind' }} /></DCArtboard>
          <DCArtboard id="lgs"    label="Large Straight"  width={1280} height={800}><Frame screen="round" tweaksOverride={{ comboTier: 'lg_straight' }} /></DCArtboard>
          <DCArtboard id="fh"     label="Full House"      width={1280} height={800}><Frame screen="round" tweaksOverride={{ comboTier: 'full_house' }} /></DCArtboard>
          <DCArtboard id="2pair"  label="Two Pair"        width={1280} height={800}><Frame screen="round" tweaksOverride={{ comboTier: 'two_pair' }} /></DCArtboard>
        </DCSection>

        <DCSection id="bosses" title="Boss Variations">
          <DCArtboard id="serpent"   label="The Serpent"        width={1280} height={800}><Frame screen="boss" tweaksOverride={{ boss: 'the_serpent' }} /></DCArtboard>
          <DCArtboard id="tower"     label="The Tower"          width={1280} height={800}><Frame screen="boss" tweaksOverride={{ boss: 'the_tower' }} /></DCArtboard>
          <DCArtboard id="devil"     label="The Devil"          width={1280} height={800}><Frame screen="boss" tweaksOverride={{ boss: 'the_devil' }} /></DCArtboard>
          <DCArtboard id="priestess" label="The High Priestess" width={1280} height={800}><Frame screen="boss" tweaksOverride={{ boss: 'the_high_priestess' }} /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
