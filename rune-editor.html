<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>FortuneFallacy — Rune Editor</title>
<style>
:root {
  --bg: #07070e;
  --surface: #0f0f1a;
  --card: #121220;
  --border: #252538;
  --gold: #c89960;
  --purple: #cc88ff;
  --text: #c0c8d8;
  --muted: #556080;
  --tier-common: #778899;
  --tier-uncommon: #44bb66;
  --tier-rare: #9955ee;
  --tier-legendary: #c89960;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
.toolbar h1 { font-size: 17px; color: var(--purple); flex: 1; letter-spacing: 0.5px; }
.btn {
  background: rgba(200,153,96,0.08);
  border: 1px solid rgba(200,153,96,0.4);
  color: var(--gold);
  padding: 5px 13px; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; white-space: nowrap;
  text-decoration: none; display: inline-block;
}
.btn:hover { background: rgba(200,153,96,0.18); }
.btn.blue { border-color: rgba(85,110,200,0.5); color: #8899dd; background: rgba(85,110,200,0.08); }
.btn.blue:hover { background: rgba(85,110,200,0.18); }
.btn.purple { border-color: rgba(180,100,255,0.5); color: var(--purple); background: rgba(150,60,220,0.08); }
.btn.purple:hover { background: rgba(150,60,220,0.18); }
.btn.red { border-color: rgba(180,40,40,0.5); color: #ff7777; background: rgba(140,30,30,0.08); }
.btn.red:hover { background: rgba(140,30,30,0.18); }
.btn.green { border-color: rgba(40,180,100,0.5); color: #44cc88; background: rgba(30,140,70,0.08); }
.btn.green:hover { background: rgba(30,140,70,0.18); }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(390px, 1fr));
  gap: 14px; padding: 18px;
}

.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.card-head {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 13px;
  background: rgba(0,0,0,0.25);
  border-bottom: 1px solid var(--border);
}
.rune-icon {
  width: 52px; height: 52px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  border: 2px solid currentColor;
  background: rgba(0,0,0,0.3);
}
.card-head-info { flex: 1; min-width: 0; }
.card-head-info strong { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-head-info span { font-size: 11px; color: var(--muted); }
.tier-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  padding: 2px 7px; border-radius: 10px;
  border: 1px solid currentColor;
  text-transform: uppercase;
  opacity: 0.85;
}
.card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

.row { display: flex; gap: 8px; align-items: flex-start; }
.field { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.field label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.field input[type=text], .field input[type=number], .field select, .field textarea {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  color: var(--text); border-radius: 5px; padding: 5px 8px;
  font-size: 12px; font-family: inherit; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 1px solid var(--purple); border-color: var(--purple);
}
.field textarea { resize: vertical; min-height: 44px; }

.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--muted); text-transform: uppercase;
  padding: 4px 0 2px; border-bottom: 1px solid var(--border); margin-bottom: 2px;
}

.behaviors { display: flex; flex-direction: column; gap: 6px; }
.beh-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: 6px;
  background: rgba(255,255,255,0.02); border: 1px solid transparent;
  transition: border-color 0.15s;
}
.beh-row.active { border-color: rgba(180,100,255,0.35); background: rgba(150,60,220,0.07); }
.beh-check { width: 15px; height: 15px; accent-color: var(--purple); cursor: pointer; flex-shrink: 0; }
.beh-label { font-size: 12px; flex: 1; cursor: pointer; }
.beh-val {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; padding: 3px 6px;
  font-size: 11px; width: 70px; font-family: 'Consolas', monospace;
  text-align: right;
}
.beh-val:focus { outline: 1px solid var(--purple); border-color: var(--purple); }

.preview-wrap { display: flex; justify-content: center; padding: 4px 0 8px; }
.rune-preview {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 14px 20px; border-radius: 10px; min-width: 90px;
  border: 1.5px solid currentColor;
  background: rgba(0,0,0,0.3);
}
.rune-preview .p-icon { font-size: 26px; }
.rune-preview .p-name { font-size: 11px; font-weight: 700; }
.rune-preview .p-tier { font-size: 9px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
.rune-preview .p-desc { font-size: 9px; opacity: 0.7; text-align: center; max-width: 120px; }

.add-btn-wrap { padding: 8px 18px 20px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 22px; max-width: 640px; width: 93%;
}
.modal h3 { color: var(--purple); margin-bottom: 10px; font-size: 15px; }
.modal p { font-size: 11px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
#exportCode {
  display: block; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px;
  font-family: 'Consolas', monospace; font-size: 10.5px; color: #99bbdd;
  margin-bottom: 12px; white-space: pre; overflow-x: auto;
  max-height: 340px; overflow-y: auto;
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.unlock-section { border-top: 1px solid var(--border); padding: 10px 14px 10px; background: rgba(180,153,80,0.03); }
.unlock-section .section-label { color: #b89940; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
.unlock-body { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.unlock-body select, .unlock-body input[type=number] { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 3px 6px; font-size: 12px; }
.unlock-label-preview { color: rgba(180,160,100,0.65); font-size: 11px; font-style: italic; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>✦ Rune Editor</h1>
  <span style="font-size:11px;color:var(--muted)">Auto-saved to localStorage</span>
  <a class="btn blue" href="editor.html">🎲 Dice</a>
  <a class="btn blue" href="anomaly-editor.html">✦ Anomalies</a>
  <a class="btn blue" href="physics-editor.html">⚙️ Physics</a>
  <button class="btn purple" onclick="addRune()">+ Add Rune</button>
  <button class="btn" onclick="openExport()">Export Code</button>
  <button class="btn red" onclick="resetAll()">Reset Defaults</button>
</div>

<div class="grid" id="grid"></div>
<div class="add-btn-wrap">
  <button class="btn purple" onclick="addRune()" style="width:100%;padding:10px">+ Add New Rune</button>
</div>

<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>Export ALL_RUNES</h3>
    <p>Copy this block and replace <code>const ALL_RUNES = [...]</code> in <strong>game.js</strong>.</p>
    <code id="exportCode"></code>
    <div class="modal-actions">
      <button class="btn green" onclick="copyExport()">Copy</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'ff_rune_editor';
const TIERS = ['common','uncommon','rare','legendary'];
const TIER_COLORS = { common:'#778899', uncommon:'#44bb66', rare:'#9955ee', legendary:'#c89960' };

const BEHAVIORS = [
  { key:'scoreBonus',      label:'+N to scored value',          default:2,    type:'number', step:1,   min:1, max:20 },
  { key:'scoreMin',        label:'Minimum score value',          default:4,    type:'number', step:1,   min:1, max:6  },
  { key:'scoreMultiplier', label:'Multiply score by N',          default:2,    type:'number', step:0.5, min:0.5, max:5 },
  { key:'triggers',        label:'Score N times (stacks)',       default:2,    type:'number', step:1,   min:2, max:4  },
  { key:'multBonus',       label:'+N Mult when scoring',         default:1,    type:'number', step:1,   min:1, max:5  },
  { key:'shardsBonus',     label:'+N shards when scoring',       default:1,    type:'number', step:1,   min:1, max:5  },
  { key:'volatile',        label:'Roll random dN instead',       default:10,   type:'number', step:2,   min:4, max:20 },
  { key:'invert',          label:'Score = 7 − face',             default:true, type:'bool'  },
  { key:'mirror',          label:'Copy highest held face',       default:true, type:'bool'  },
  { key:'rerollMult',      label:'+1 Mult per reroll used',      default:true, type:'bool'  },
  { key:'noReroll',        label:'Cannot be rerolled',           default:true, type:'bool'  },
  { key:'collisionBonus',  label:'+N score per die collision',   default:3,    type:'number', step:1,   min:1, max:10 },
];

const DEFAULT_RUNES = [
  { id:'amplify',   name:'Amplify',   tier:'common',    icon:'⬆', color:'#7799ee', cost:2, desc:'+2 to scored value',        scoreBonus:2 },
  { id:'gilded',    name:'Gilded',    tier:'common',    icon:'◆', color:'#c89960', cost:2, desc:'+1 ◆ shard on score',       shardsBonus:1 },
  { id:'blessed',   name:'Blessed',   tier:'common',    icon:'✦', color:'#ddcc55', cost:3, desc:'Scores at least 4',         scoreMin:4 },
  { id:'sharpened', name:'Sharpened', tier:'common',    icon:'▲', color:'#88bbaa', cost:3, desc:'+1 Mult when scoring',      multBonus:1 },
  { id:'echo',      name:'Echo',      tier:'uncommon',  icon:'◎', color:'#55ccaa', cost:5, desc:'Scores one extra time',     triggers:2 },
  { id:'dark',      name:'Dark',      tier:'uncommon',  icon:'☽', color:'#9955dd', cost:4, desc:'Score = 7 − face value',    invert:true },
  { id:'volatile',  name:'Volatile',  tier:'uncommon',  icon:'?', color:'#ff6644', cost:4, desc:'Scores a random d10',      volatile:10 },
  { id:'surge',     name:'Surge',     tier:'uncommon',  icon:'⚡', color:'#ffcc22', cost:5, desc:'+1 Mult per reroll used',   rerollMult:true },
  { id:'anchor',    name:'Anchor',    tier:'rare',      icon:'⚓', color:'#aabbcc', cost:7, desc:'×2 score — cannot reroll', scoreMultiplier:2, noReroll:true },
  { id:'mirror_r',  name:'Mirror',    tier:'rare',      icon:'◈', color:'#88ddff', cost:8, desc:'Copies highest held face',  mirror:true },
  { id:'resonance', name:'Resonance', tier:'rare',      icon:'≋', color:'#cc88ff', cost:7, desc:'+3 Chips per die collision',collisionBonus:3 },
  { id:'sovereign', name:'Sovereign', tier:'legendary', icon:'♛', color:'#ffaa44', cost:12,desc:'Scores three times',        triggers:3 },
];

let runes = [];

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { runes = JSON.parse(saved); return; } catch {} }
  runes = DEFAULT_RUNES.map(r => ({...r}));
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(runes));
}

function resetAll() {
  if (!confirm('Reset all runes to game defaults?')) return;
  localStorage.removeItem(STORAGE_KEY);
  runes = DEFAULT_RUNES.map(r => ({...r}));
  render();
}

function addRune() {
  runes.push({ id:'new_rune_'+Date.now(), name:'New Rune', tier:'common', icon:'✦', color:'#9955ee', cost:3, desc:'Describe the effect' });
  save();
  render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.card');
    cards[cards.length-1].scrollIntoView({behavior:'smooth', block:'center'});
  }, 50);
}

function deleteRune(idx) {
  if (!confirm(`Delete "${runes[idx].name}"?`)) return;
  runes.splice(idx, 1);
  save();
  render();
}

function setField(idx, key, val) {
  runes[idx][key] = val;
  save();
  refreshCard(idx);
}

function setBehEnabled(idx, key, enabled) {
  const def = BEHAVIORS.find(b => b.key === key);
  if (enabled) {
    runes[idx][key] = def.default;
  } else {
    delete runes[idx][key];
  }
  save();
  render(); // re-render to update beh row active state
}

function setBehVal(idx, key, val) {
  const def = BEHAVIORS.find(b => b.key === key);
  runes[idx][key] = def.type === 'number' ? parseFloat(val) : val === 'true';
  save();
  refreshCard(idx);
}

function refreshCard(idx) {
  // Just re-render the preview and header for this card
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;
  const r = runes[idx];
  const col = r.color || '#9955ee';
  const tierCol = TIER_COLORS[r.tier] || '#778899';

  // Update icon display
  const iconEl = card.querySelector('.rune-icon');
  if (iconEl) { iconEl.textContent = r.icon || '?'; iconEl.style.color = col; iconEl.style.borderColor = col; }

  // Update header name
  const nameEl = card.querySelector('.card-head-info strong');
  if (nameEl) nameEl.textContent = r.name || 'Unnamed';

  // Update tier badge
  const badgeEl = card.querySelector('.tier-badge');
  if (badgeEl) { badgeEl.textContent = r.tier; badgeEl.style.color = tierCol; badgeEl.style.borderColor = tierCol; }

  // Update preview
  const prev = card.querySelector('.rune-preview');
  if (prev) {
    prev.style.color = col;
    prev.style.borderColor = col;
    prev.querySelector('.p-icon').textContent = r.icon || '?';
    prev.querySelector('.p-name').textContent = r.name || 'Unnamed';
    prev.querySelector('.p-tier').textContent = r.tier;
    prev.querySelector('.p-desc').textContent = r.desc || '';
  }
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = runes.map((r, idx) => buildCard(r, idx)).join('');
}

function buildCard(r, idx) {
  const col     = r.color || '#9955ee';
  const tierCol = TIER_COLORS[r.tier] || '#778899';

  const behaviorsHTML = BEHAVIORS.map(b => {
    const has   = b.key in r;
    const val   = has ? r[b.key] : b.default;
    const valUI = b.type === 'bool' ? '' : `
      <input class="beh-val" type="number" step="${b.step}" min="${b.min}" max="${b.max}"
        value="${val}" ${!has ? 'disabled' : ''}
        onchange="setBehVal(${idx},'${b.key}',this.value)"
        onclick="event.stopPropagation()">`;
    return `
      <div class="beh-row${has ? ' active' : ''}" onclick="setBehEnabled(${idx},'${b.key}',${!has})">
        <input class="beh-check" type="checkbox" ${has ? 'checked' : ''}
          onclick="event.stopPropagation();setBehEnabled(${idx},'${b.key}',this.checked)">
        <span class="beh-label">${b.label}</span>
        ${valUI}
      </div>`;
  }).join('');

  return `
  <div class="card" id="card-${idx}">
    <div class="card-head">
      <div class="rune-icon" style="color:${col};border-color:${col}">${r.icon || '?'}</div>
      <div class="card-head-info">
        <strong>${r.name || 'Unnamed'}</strong>
        <span>${r.id || ''}</span>
      </div>
      <span class="tier-badge" style="color:${tierCol};border-color:${tierCol}">${r.tier}</span>
      <button class="btn red" style="padding:3px 8px;font-size:11px" onclick="deleteRune(${idx})">✕</button>
    </div>
    <div class="card-body">

      <!-- Preview -->
      <div class="preview-wrap">
        <div class="rune-preview" style="color:${col};border-color:${col}">
          <span class="p-icon">${r.icon || '?'}</span>
          <span class="p-name">${r.name || 'Unnamed'}</span>
          <span class="p-tier">${r.tier}</span>
          <span class="p-desc">${r.desc || ''}</span>
        </div>
      </div>

      <!-- Identity -->
      <div class="section-label">Identity</div>
      <div class="row">
        <div class="field" style="flex:2">
          <label>Name</label>
          <input type="text" value="${esc(r.name)}"
            oninput="setField(${idx},'name',this.value)">
        </div>
        <div class="field" style="flex:1.2">
          <label>ID</label>
          <input type="text" value="${esc(r.id)}"
            oninput="setField(${idx},'id',this.value)">
        </div>
      </div>
      <div class="row">
        <div class="field" style="flex:0 0 70px">
          <label>Icon</label>
          <input type="text" value="${esc(r.icon)}"
            oninput="setField(${idx},'icon',this.value)"
            style="text-align:center;font-size:18px">
        </div>
        <div class="field" style="flex:0 0 100px">
          <label>Color</label>
          <input type="text" value="${esc(r.color)}"
            oninput="setField(${idx},'color',this.value)"
            style="font-family:monospace">
        </div>
        <div class="field" style="flex:0 0 80px">
          <label>Tier</label>
          <select onchange="setField(${idx},'tier',this.value)">
            ${TIERS.map(t => `<option value="${t}"${r.tier===t?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="flex:0 0 60px">
          <label>Cost ◆</label>
          <input type="number" min="0" max="30" value="${r.cost||0}"
            oninput="setField(${idx},'cost',+this.value)">
        </div>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea oninput="setField(${idx},'desc',this.value)">${esc(r.desc)}</textarea>
      </div>

      <!-- Behaviors -->
      <div class="section-label">Behaviors (check to enable)</div>
      <div class="behaviors">${behaviorsHTML}</div>

    </div>
    <div id="unlock-sec-${idx}">${buildUnlockSection(r, idx)}</div>
  </div>`;
}

function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ── Export ────────────────────────────────────────────────────────────
function openExport() {
  document.getElementById('exportCode').textContent = generateCode();
  document.getElementById('exportModal').classList.add('open');
}
function closeModal() {
  document.getElementById('exportModal').classList.remove('open');
}
function copyExport() {
  navigator.clipboard.writeText(generateCode()).then(() => alert('Copied!'));
}
document.getElementById('exportModal').addEventListener('click', e => {
  if (e.target === document.getElementById('exportModal')) closeModal();
});

// ─── Unlock section ───────────────────────────────────────────────────
const UNLOCK_COMBOS = [
  ['five_of_a_kind','Five of a Kind'],['four_of_a_kind','Four of a Kind'],
  ['full_house','Full House'],['large_straight','Large Straight'],
  ['small_straight','Small Straight'],['three_of_a_kind','Three of a Kind'],
  ['two_pair','Two Pair'],['one_pair','One Pair'],['chance','Chance']];
function unlockLabel(req) {
  if (!req) return '';
  if (req.type === 'clear_goal')   return `Clear Goal ${req.value}`;
  if (req.type === 'score_combo')  { const c = UNLOCK_COMBOS.find(c=>c[0]===req.value); return `Score a ${c?c[1]:req.value}`; }
  if (req.type === 'spend_shards') return `Spend ${req.value} shards in a single run`;
  if (req.type === 'own_upgrades') return `Own ${req.value} or more upgraded dice`;
  if (req.type === 'score_hands')  return `Score ${req.value} hands in a run`;
  if (req.type === 'win_run')      return 'Complete a full run';
  return '';
}
function buildUnlockSection(item, idx) {
  const u = item.unlock;
  const req = u ? (u.req || {type:'clear_goal',value:1}) : null;
  const typeOpts = [['clear_goal','Clear Goal N'],['score_combo','Score Combo'],
    ['spend_shards','Spend N Shards'],['own_upgrades','Own N Upgrades'],
    ['score_hands','Score N Hands'],['win_run','Win a Run']];
  const selHtml = req ? `<select onchange="updUnlockType(${idx},this.value)">${
    typeOpts.map(([v,l])=>`<option value="${v}"${req.type===v?' selected':''}>${l}</option>`).join('')
  }</select>` : '';
  let valHtml = '';
  if (req && req.type === 'score_combo') {
    valHtml = `<select onchange="updUnlockVal(${idx},this.value)">${
      UNLOCK_COMBOS.map(([id,nm])=>`<option value="${id}"${req.value===id?' selected':''}>${nm}</option>`).join('')
    }</select>`;
  } else if (req && req.type !== 'win_run') {
    valHtml = `<input type="number" value="${req.value||1}" min="1" max="50" style="width:52px" oninput="updUnlockVal(${idx},+this.value)"/>`;
  }
  return `<div class="unlock-section">
    <div class="section-label" style="display:flex;align-items:center;gap:6px">
      <input type="checkbox" id="unl-${idx}" ${u?'checked':''} onchange="togUnlock(${idx},this.checked)"/>
      <label for="unl-${idx}" style="cursor:pointer;text-transform:none;font-size:12px">Unlockable</label>
    </div>
    ${u ? `<div class="unlock-body">${selHtml}${valHtml}<span class="unlock-label-preview">${unlockLabel(req)}</span></div>` : ''}
  </div>`;
}
function togUnlock(idx, on) {
  if (on) runes[idx].unlock = { id: runes[idx].id, label: 'Clear Goal 1', req: {type:'clear_goal',value:1} };
  else delete runes[idx].unlock;
  save();
  const el = document.getElementById(`unlock-sec-${idx}`);
  if (el) el.outerHTML = `<div id="unlock-sec-${idx}">${buildUnlockSection(runes[idx], idx)}</div>`;
}
function updUnlockType(idx, type) {
  if (!runes[idx].unlock) return;
  const defVal = type === 'score_combo' ? 'five_of_a_kind' : type === 'win_run' ? undefined : 1;
  runes[idx].unlock.req = { type, value: defVal };
  runes[idx].unlock.label = unlockLabel(runes[idx].unlock.req);
  save();
  const el = document.getElementById(`unlock-sec-${idx}`);
  if (el) el.outerHTML = `<div id="unlock-sec-${idx}">${buildUnlockSection(runes[idx], idx)}</div>`;
}
function updUnlockVal(idx, val) {
  if (!runes[idx].unlock) return;
  runes[idx].unlock.req.value = val;
  runes[idx].unlock.label = unlockLabel(runes[idx].unlock.req);
  save();
  const el = document.querySelector(`#unlock-sec-${idx} .unlock-label-preview`);
  if (el) el.textContent = runes[idx].unlock.label;
}

function generateCode() {
  const makeEntry = r => {
    const props = [];
    props.push(`id:'${r.id}'`);
    props.push(`name:'${r.name}'`);
    props.push(`tier:'${r.tier}'`);
    props.push(`icon:'${r.icon}'`);
    props.push(`color:'${r.color}'`);
    props.push(`cost:${r.cost}`);
    props.push(`desc:'${r.desc.replace(/'/g,"\\'")}'`);
    for (const b of BEHAVIORS) {
      if (b.key in r) {
        const v = r[b.key];
        props.push(`${b.key}:${typeof v === 'boolean' ? v : v}`);
      }
    }
    if (r.unlock) {
      const u = r.unlock, req = u.req||{type:'clear_goal',value:1};
      const rv = req.value === undefined ? '' : `,value:${typeof req.value==='string'?`'${req.value}'`:req.value}`;
      props.push(`unlock:{id:'${u.id}',label:'${u.label.replace(/'/g,"\\'")}',req:{type:'${req.type}'${rv}}}`);
    }
    return `  { ${props.join(', ')} }`;
  };
  const regular    = runes.filter(r => !r.unlock).map(makeEntry);
  const unlockable = runes.filter(r =>  r.unlock).map(makeEntry);
  let out = `const ALL_RUNES = [\n${regular.join(',\n')}\n];`;
  if (unlockable.length) out += `\n\nconst UNLOCKABLE_RUNES = [\n${unlockable.join(',\n')}\n];`;
  return out;
}

load();
render();
</script>
