<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fortune Fallacy — UI Exploration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --cosmos-50:  #f3f0ff;
    --cosmos-100: #dcd4ff;
    --cosmos-200: #bba8ff;
    --cosmos-300: #9577ff;
    --cosmos-400: #7752f0;
    --cosmos-500: #5c39c4;
    --cosmos-600: #432896;
    --cosmos-700: #2e1d6b;
    --cosmos-800: #1c1245;
    --cosmos-900: #0f0925;
    --cosmos-950: #07051a;
    --ember:   #ff7847;
    --crimson: #e2334a;
    --gold:    #f5c451;
    --astral:  #7be3ff;
    --astral-deep: #2da7c8;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--cosmos-950);
    color: var(--cosmos-50);
    font-family: 'Exo 2', system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #stage-host {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: radial-gradient(ellipse at 50% 35%, #1a0f3d 0%, #0f0925 45%, #07051a 100%);
  }
  #stage {
    width: 1280px; height: 800px;
    position: relative;
    transform-origin: center center;
    overflow: hidden;
    border-radius: 14px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(149,119,255,0.18);
    isolation: isolate;
  }
  /* type helpers */
  .f-display { font-family: 'Cinzel Decorative', serif; letter-spacing: 0.02em; }
  .f-head    { font-family: 'Cinzel', serif; letter-spacing: 0.06em; }
  .f-body    { font-family: 'Exo 2', sans-serif; }
  .f-mono    { font-family: 'JetBrains Mono', monospace; }
  .uc { text-transform: uppercase; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .hairline { border: 1px solid rgba(149, 119, 255, 0.22); }

  /* shared FX */
  @keyframes twinkle { 0%,100% { opacity: 0.25; } 50% { opacity: 1; } }
  @keyframes drift   { 0% { transform: translate3d(0,0,0); } 100% { transform: translate3d(-200px, -80px, 0); } }
  @keyframes orbit   { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes pulse-glow { 0%,100% { filter: drop-shadow(0 0 6px var(--astral)); } 50% { filter: drop-shadow(0 0 18px var(--astral)); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes float-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes ring-expand { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
  @keyframes constellation-draw {
    from { stroke-dashoffset: var(--len, 200); }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes score-pop {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { transform: translateY(-8px) scale(1.1); opacity: 1; }
    100% { transform: translateY(-60px) scale(1); opacity: 0; }
  }

  /* 3D dice */
  .die3d-wrap {
    position: relative;
    perspective: 800px;
    user-select: none;
  }
  .die3d {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 600ms cubic-bezier(.4,1.4,.5,1);
  }
  .die3d-face {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    border-radius: 12px;
    backface-visibility: hidden;
  }
  .die3d-face::before {
    content: "";
    position: absolute; inset: 1px;
    border-radius: 11px;
    background: linear-gradient(160deg, rgba(255,255,255,0.10), transparent 55%);
    pointer-events: none;
  }
  .die3d-wrap.idle .die3d {
    animation: idle-tumble 8s ease-in-out infinite;
  }
  @keyframes idle-tumble {
    0%, 100% { transform: var(--face-rot) rotateX(0deg) rotateY(0deg); }
    25%      { transform: var(--face-rot) rotateX(4deg) rotateY(-3deg); }
    50%      { transform: var(--face-rot) rotateX(-3deg) rotateY(5deg); }
    75%      { transform: var(--face-rot) rotateX(2deg) rotateY(-2deg); }
  }
  .die3d-wrap.locked { transform: translateY(-12px); }
  .die3d-wrap.scoring::after {
    content: "";
    position: absolute; inset: -10px;
    border-radius: 22px;
    border: 1.5px solid var(--astral);
    box-shadow: 0 0 28px var(--astral), inset 0 0 12px rgba(123,227,255,0.4);
    pointer-events: none;
    animation: pulse-glow 1.6s ease-in-out infinite;
  }
  .die3d-shadow {
    position: absolute;
    left: 50%; bottom: -10px;
    width: 70%;
    height: 12px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse, rgba(0,0,0,0.55), transparent 70%);
    filter: blur(4px);
    pointer-events: none;
  }

  /* pretty scrollbar */
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-track { background: transparent; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(149,119,255,0.25); border-radius: 3px; }

  /* button base */
  .btn {
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    transition: transform 120ms, filter 120ms, box-shadow 120ms;
    user-select: none;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.4); }

  .btn-primary {
    background: linear-gradient(180deg, #ff8a5e, #e85a28);
    color: #20100a;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 18px;
    box-shadow:
      0 0 0 1px rgba(255,180,140,0.6),
      0 6px 18px rgba(255,120,71,0.35),
      inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .btn-ghost {
    background: rgba(28,18,69,0.6);
    color: var(--cosmos-50);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: 0 0 0 1px rgba(149,119,255,0.3);
    backdrop-filter: blur(8px);
  }
  .btn-tab {
    background: transparent;
    color: var(--cosmos-200);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    box-shadow: 0 0 0 1px rgba(149,119,255,0.18);
  }
  .btn-tab.active {
    background: rgba(123,227,255,0.1);
    color: var(--astral);
    box-shadow: 0 0 0 1px rgba(123,227,255,0.5), inset 0 0 12px rgba(123,227,255,0.15);
  }

  /* glassy panel */
  .panel {
    background:
      linear-gradient(180deg, rgba(46,29,107,0.35), rgba(15,9,37,0.55));
    backdrop-filter: blur(10px);
    border: 1px solid rgba(149, 119, 255, 0.22);
    border-radius: 16px;
  }
  .panel-strong {
    background: linear-gradient(180deg, rgba(46,29,107,0.65), rgba(15,9,37,0.85));
    border: 1px solid rgba(149, 119, 255, 0.34);
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* shimmer line */
  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(123,227,255,0.5), transparent);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  /* astrolabe spin */
  .spin-slow  { animation: orbit 60s linear infinite; }
  .spin-rev   { animation: orbit 90s linear infinite reverse; }

  /* soft star bg layer */
  .star-layer {
    position: absolute; inset: 0; pointer-events: none;
    background-repeat: repeat;
    background-size: 600px 600px;
  }

  /* tooltip */
  .tip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
         background: rgba(7,5,26,0.95); color: var(--cosmos-50);
         padding: 8px 12px; border-radius: 8px; font-size: 11px; line-height: 1.4;
         border: 1px solid rgba(123,227,255,0.4);
         white-space: nowrap; pointer-events: none; opacity: 0;
         transition: opacity 120ms;
         z-index: 50;
  }
  .has-tip:hover .tip { opacity: 1; }

  /* card flourishes */
  .flourish-corner {
    position: absolute; width: 22px; height: 22px;
    border: 1px solid rgba(245, 196, 81, 0.5);
    pointer-events: none;
  }
  .flourish-corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
  .flourish-corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
  .flourish-corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
  .flourish-corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

  /* allow design canvas overrides */
  body[data-mode="canvas"] #stage-host { display: block; }
</style>
</head>
<body>
  <div id="stage-host">
    <div id="stage"></div>
  </div>

  <script>
  // tweaks (must be at root, JSON-only)
  window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "screen": "round",
    "theme": "voidlit",
    "dieStyle": "celestial",
    "starDensity": 0.3,
    "nebula": false,
    "parallax": true,
    "constellationLines": true,
    "scoringFx": true,
    "dieSize": 88,
    "trayCurve": 1.3,
    "primaryAccent": "astral",
    "fontHeading": "cinzel",
    "buttonStyle": "ember",
    "showSpeakerOrnaments": true,
    "comboTier": "full_house",
    "boss": "the_fool",
    "shardsCount": 0,
    "anteLevel": 1,
    "panelTint": 0.35,
    "showInlineHelp": true
  }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="cosmos.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // scale 1280x800 stage to viewport
    function fitStage() {
      const stage = document.getElementById('stage');
      if (!stage) return;
      const w = window.innerWidth, h = window.innerHeight;
      const scale = Math.min(w / 1280, h / 800) * 0.96;
      stage.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', fitStage);
    requestAnimationFrame(fitStage);
    setTimeout(fitStage, 50);
    setTimeout(fitStage, 300);
  </script>
</body>
</html>
